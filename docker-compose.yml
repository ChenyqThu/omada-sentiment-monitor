version: '3.8'

services:
  omada-sentiment-monitor:
    build: .
    container_name: omada-monitor
    restart: unless-stopped

    environment:
      # Reddit API 配置
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT}

      # AI 过滤配置
      - AI_FILTER_PROVIDER=${AI_FILTER_PROVIDER:-gemini}
      - AI_FILTER_API_KEY=${AI_FILTER_API_KEY}
      - AI_FILTER_MODEL=${AI_FILTER_MODEL:-gemini-2.0-flash-lite}

      # Notion API 配置
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - NOTION_KOL_DATABASE_ID=${NOTION_KOL_DATABASE_ID}

      # 邮件配置
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - EMAIL_RECIPIENTS=${EMAIL_RECIPIENTS}

      # 系统配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-300}
      - TARGET_SUBREDDITS=${TARGET_SUBREDDITS:-homenetworking,networking}
      - PRIMARY_KEYWORDS=${PRIMARY_KEYWORDS:-omada,tp-link omada}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - TEST_MODE=${TEST_MODE:-false}

      # 容器配置
      - TZ=Asia/Shanghai

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "src/main.py", "--mode", "health"]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 10s

    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
